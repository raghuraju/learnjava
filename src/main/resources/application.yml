spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/learnjavadb
    username: learnjavauser
    password: password
  jpa:
    hibernate:
      ddl-auto: none
  application:
    name: learnjava

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG
